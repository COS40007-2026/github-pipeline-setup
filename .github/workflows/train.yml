name: Train ML Model

on:
  push:
    branches: [ main ]        # runs every time you push to main
  pull_request:
    branches: [ main ]        # runs on pull requests to main
  workflow_dispatch:           # allows manual trigger from GitHub UI

jobs:
  run:
    runs-on: [ubuntu-latest]
    steps:
      - uses: actions/checkout@v2
      - name: 'Train my model'
        run: |
          # Your ML workflow goes here
          pip install -r requirements.txt
          python model.py          
          echo "## Model Metrics" > report.md
          cat metrics.txt >> report.md          
          echo "\n## Model Performance" >> report.md
          echo "Model performance metrics are on the plot below." >> report.md          
          cml-publish model_results.png --md >> report.md          
          cml-send-comment report.md
